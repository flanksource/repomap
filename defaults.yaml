# Default scope detection rules
# This file is embedded in the binary and provides fallback detection when no repomap.yaml is found
# Note: These patterns use filepath.Match which only supports * and ?, not **

scopes:
  rules:
    ci:
      - path: "BUILD.bazel"
      - path: "WORKSPACE"
      - path: "*.bazel"
      - path: "*.bzl"
      - path: "Jenkinsfile"
      - path: "Makefile"
      - path: "Taskefile"
      - path: "Taskfile.yml"
      - path: "*.sh"
      - path: "*.bat"
      - path: "*.ps1"
      - path: "*.zsh"

    dependency:
      - path: "go.mod"
      - path: "go.sum"
      - path: "package.json"
      - path: "package-lock.json"
      - path: "requirements.txt"
      - path: "Pipfile"
      - path: "Pipfile.lock"
      - path: "setup.py"
      - path: "pom.xml"
      - path: "build.gradle"
      - path: "build.gradle.kts"
      - path: "Gemfile"
      - path: "Gemfile.lock"
      - path: "Cargo.toml"
      - path: "Cargo.lock"
      - path: "composer.json"
      - path: "composer.lock"

    docs:
      - path: "README.md"
      - path: "README.txt"
      - path: "README"
      - path: "README.rst"
      - path: "CHANGELOG.md"
      - path: "CHANGELOG"
      - path: "CHANGELOG.txt"
      - path: "*.md"
      - path: "*.markdown"
      - path: "*.mdx"

    test:
      - path: "*test*"
      - path: "**/*test/**"

    kubernetes:
      - path: "kustomization.yaml"
      - path: "kustomization.yml"

    helm:
      - path: "Chart.yaml"
      - path: "chart/**"

    terraform:
      - path: ".terraform.lock.hcl"
      - path: "*.tf"
      - path: "*.tfvars"
      - path: "*.tf.json"

    bazel:
      - path: "BUILD.bazel"
      - path: "WORKSPACE"
      - path: "*.bazel"
      - path: "*.bzl"

    go:
      - path: "go.mod"
      - path: "go.sum"
      - path: "*.go"

    nodejs:
      - path: "package.json"
      - path: "package-lock.json"
      - path: "*.js"
      - path: "*.jsx"
      - path: "*.ts"
      - path: "*.tsx"

    python:
      - path: "requirements.txt"
      - path: "Pipfile"
      - path: "Pipfile.lock"
      - path: "setup.py"
      - path: "*.py"

    java:
      - path: "pom.xml"
      - path: "build.gradle"
      - path: "build.gradle.kts"
      - path: "*.java"
      - path: "*.kt"
      - path: "*.kts"
      - path: "*.groovy"

    ruby:
      - path: "Gemfile"
      - path: "Gemfile.lock"
      - path: "*.rb"

    rust:
      - path: "Cargo.toml"
      - path: "Cargo.lock"
      - path: "*.rs"

    php:
      - path: "composer.json"
      - path: "composer.lock"
      - path: "*.php"

    shell:
      - path: "*.sh"
      - path: "*.bat"
      - path: "*.ps1"
      - path: "*.zsh"

    jenkins:
      - path: "Jenkinsfile"

    docker:
      - path: "Dockerfile"

    markdown:
      - path: "*.md"
      - path: "*.markdown"
      - path: "*.mdx"

git:
  version_field_patterns:
    - "**.image"
    - "**.tag"
    - "**.version"
    - "**.appVersion"
    - "**.imageTag"
