apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app
  namespace: apps
spec:
  chart:
    spec:
      chart: app
      version: 1.2.0
      sourceRef:
        kind: HelmRepository
        name: oci-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oci-charts
  namespace: apps
spec:
  type: oci
  url: oci://ghcr.io/acme/charts
