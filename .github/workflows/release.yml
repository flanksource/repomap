name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest

      - name: Determine next version
        id: version
        run: |
          NEXT=$(svu next --force-patch-increment)
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.next }}
          git push origin ${{ steps.version.outputs.next }}

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.next }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              output="repomap-${GOOS}-${GOARCH}"
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "dist/${output}" ./cmd/repomap
            done
          done
          cd dist && sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.next }} \
            --generate-notes \
            dist/*
